<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewreport" content="width=device-heigh, initial-scale=1.0">
    <title>TLU E-commerce</title>
</head>
    <h1>Đăng ký tài khoản</h1>
    <form action="#", method="POST">
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            <label for="hoten">Họ tên</label>
            <input type="text" id="hoten" name="hoten" required minlength="2" maxlength="50" placeholder="Hoàng Ngọc Tú"><br>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="hoangngoctu@gmail.com"><br>
            <label for="sdt">Email</label>
            <input type="tel" id="sdt" name="sdt" pattern="[0-9]{10}" placeholder="0878866206"><br>
            <label for="born">Ngày sinh</label>
            <input type="date" id="born" name="born" max="04-29-2026" placeholder="04-29-2026">
        </fieldset>

        <fieldset>
            <legend>Tài khoản</legend>
            <label for="username">Tên tài khoản</label>
            <input type="text" id="hoten" name="hoten" pattern="[a-z A-Z 0-9 _]{3-20}" placeholder="tuTLU_123"><br>
            <label for="matkhau">Mật khẩu</label>
            <input type="password" id="matkhau" name="matkhau" minlength="8" pattern="[(?.=[A-Z])(?.=[0-9])].{8,}" placeholder="*********"><br>
            <label for="matkhau2">Nhập lại mật khẩu</label>
            <input type="password" id="matkhau2" name="matkhau2" minlength="8" pattern="[(?.=[A-Z])(?.=[0-9])].{8,}" placeholder="*********"><br>
        </fieldset>

        <fieldset>
            <legend>Thông tin giao hàng</legend>
            <label for="thanhpho">Thành phố</label>
            <select id="thanhpho" name="thanhpho">
                <option value="">Tỉnh thành</option>
                <option value="hn">Hà Nội</option>
                <option value="hcm">Hồ Chí Minh</option>
                <option value="hd">Hải Dương</option>
                <option value="hp">Hải Phòng</option>
                <option value="th">Thanh hóa</option>
            </select>
            <br>
            <label for="quan">Quận huyện</label>
            <select id="quan" name="quan">
                <option value="">Quận Huyện</option>
                <option value="dc">Định Công</option>
                <option value="hm">Hoàng Mai</option>
                <option value="bm">Bach Mai</option>
                <option value="q1">Quận 1</option>
                <option value="q2">Quận 2</option>
            </select>     
            <br>
            <label for="diachi">Địa chỉ chi tiết</label><br>
            <textarea id="diachi" name="diachi" rows="3" placeholder="Số nhà, tên đường,.."></textarea><br>
            <label for="gioitinh">Giới tính</label>
            <input type="radio" id="nam" name="gioitinh" value="nam">
            <label for="nam">Nam</label>
            <input type="radio" id="nu" name="gioitinh" value="nu">
            <label for="nu">Nữ</label><br>
        </fieldset>

        <label for="term">Điều khoản</label>
        <input type="checkbox" id="term" name="term">
        
        <button type="submit">Đăng ký</button>
        <button type="reset">Reset</button>
    </form>
    <footer>
        <p>2026 - TLU</p>
    </footer>

</html>
