<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Debug Layout</title>
  <link rel="stylesheet" href="debug_layout.css" />
</head>
<body>
  <h1>Debug layout: 2 cách sửa</h1>

  <section class="borderbox">
    <h2>Cách 1: border-box</h2>
    <div class="container clearfix">
      <div class="sidebar">Sidebar</div>
      <div class="content">Content</div>
    </div>
  </section>

  <section class="borderbox">
    <h2>Cách 2: không dùng border-box</h2>
    <div class="container clearfix">
      <div class="sidebar no-box">Sidebar</div>
      <div class="content  no-box">Content</div>
    </div>
  </section>
</body>
</html>
